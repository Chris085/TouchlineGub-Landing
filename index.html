<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Primary SEO Meta Tags -->
    <title>The Touchline Hub - Modern Grassroots Football Team Management App</title>
    <meta name="description" content="Touchline Hub is the premier grassroots football team management app. Streamline matchday planning, squad communication, attendance tracking, live match control, and player statistics in one platform." />
    <meta name="keywords" content="grassroots football app, youth football management, soccer coach app, team attendance tracker, matchday manager, football statistics, squad alignment, tactical coach tool, amateur football league tracker, touchline hub" />
    <meta name="author" content="Touchline Hub" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://touchlinehub.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://touchlinehub.com/" />
    <meta property="og:title" content="Touchline Hub - Modern Youth Football Management App" />
    <meta property="og:description" content="Streamline your youth football team management, track live stats, write tactical notes, and coordinate team notifications—all in one place." />
    <meta property="og:image" content="https://touchlinehub.com/favicon.svg" />
    <meta property="og:site_name" content="Touchline Hub" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://touchlinehub.com/" />
    <meta name="twitter:title" content="Touchline Hub - Grassroots Football Coaching Software" />
    <meta name="twitter:description" content="A complete squad and matchday hub built for modern grassroots football coaches. Track live team events and attendance easily." />
    <meta name="twitter:image" content="https://touchlinehub.com/favicon.svg" />

    <!-- Theme and Mobile PWA capability -->
    <meta name="theme-color" content="#020617" />

    <!-- Structured Data (Schema.org JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Touchline Hub",
        "url": "https://touchlinehub.com",
        "image": "https://touchlinehub.com/favicon.svg",
        "operatingSystem": "All",
        "applicationCategory": "SportsApplication, SoftwareApplication",
        "description": "Touchline Hub is a professional, responsive grassroots football coaching and team management platform. Built to simplify squad setup, player performance analysis, matchday attendance lists, and live match control.",
        "offers": {
          "@type": "Offer",
          "price": "14.99",
          "priceCurrency": "GBP",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "14.99",
            "priceCurrency": "GBP",
            "unitText": "Month"
          }
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "reviewCount": "142",
          "bestRating": "5",
          "worstRating": "1"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
